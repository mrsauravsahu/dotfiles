unbind C-b
set -g prefix `
bind ` send-prefix

set -g mouse on

run '~/.config/tmux/plugins/tpm/tpm'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jkhas8/tmux-paste-image'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'lost-melody/tmux-command-palette'

# Default shell
set-option -g default-shell $SHELL

# Turn on extended keys -> requested by pi coding agent
set -g extended-keys on
set -g extended-keys-format csi-u

# Allow pasting image
set-option -g allow-passthrough on

# Split panes with h and v
bind h split-window -h -c "#{pane_current_path}"
bind v split-window -v -c "#{pane_current_path}"

# Start tab numbering from 1
set -g base-index 1
setw -g pane-base-index 1

# Reload config with ` r 
bind-key r source-file ~/.config/tmux/tmux.conf \; 

# Toggle synchronize panes with ` b to send same commands to all panes
bind-key b set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# Toggle status line with ` y
bind-key y set -g status

# Toggle matrix mode (all text renders green) with ` m
bind-key m run-shell 'state=$(tmux show-option -gqv @matrix_mode); tty="#{client_tty}"; if [ "$state" = "on" ]; then printf "\033]110\007\033]111\007\033]112\007\033]104\007" > "$tty"; tmux set-option -g @matrix_mode off; else printf "\033]10;#33ff66\007\033]11;#000000\007\033]12;#33ff66\007" > "$tty"; for i in 0 1 2 3 4 5 6 7; do printf "\033]4;%d;#1fae4a\007" "$i" > "$tty"; done; for i in 8 9 10 11 12 13 14 15; do printf "\033]4;%d;#66ff99\007" "$i" > "$tty"; done; tmux set-option -g @matrix_mode on; fi'

# TMUX STATUSLINE CONFIGURATIONS 
set-option -g status-position "top"
set-option -g status-style "#{?window_zoomed_flag,bg=#00ff1d fg=#282828,bg=#282828 fg=#ebdbb2}"
set-option -g status-justify left

# I display the session name on the left:
set-option -g status-left '#{?window_zoomed_flag,#[bg=#00ff1d fg=#282828 bold],#[bg=#282828 fg=#ffffff bold]}#{?client_prefix,,    }'

# I display the system uptime and current time on the right
set-option -g status-right "#{?window_zoomed_flag,#[bg=#00ff1d fg=#282828 bold],#[fg=#ffffff bold]} 󰺓 #(uptime | awk '{print $3}' | sed 's/,//')  󰔟 %R"

# I customize the appearance of window titles:
set-option -g window-status-current-format '#{?window_zoomed_flag,#[bg=#282828 fg=#00ff1d bold],#[bg=#00ff1d fg=#282828]} #I:#W#{?window_zoomed_flag, 󰊓 , }'
set-option -g window-status-format ' #I:#W#{?window_zoomed_flag, 󰊓 , }'

# Always renumber tabs to be 1, 2, 3 ...
set -g renumber-windows on
setw -g allow-rename on

# Open a path in vim in a new window: press ` o, type path, hit Enter
# bind-key o display-popup -E -d '$HOME' 'dir=$(FZF_DEFAULT_COMMAND="find . -type d -maxdepth 5" fzf) && tmux new-window -c "$HOME/$dir" "zsh -i -c \"vim $dir\""'

# Open a path in nvim via autojump: press ` o, type jump query, hit Enter
bind-key o command-prompt -p "$ nvim:" "run-shell \"tmux new-window -c '\$HOME' zsh -i -c 'vim \\\"\$(j %1)\\\"'\""
bind-key = run-shell "tmux new-window zsh -i -c 'cursor-agent'"

